name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @medical-portal/shared build

      - name: Typecheck service-api
        run: pnpm --filter service-api typecheck

      - name: Build service-api
        run: pnpm --filter service-api build

      - name: Build web-client
        run: pnpm --filter web-client build
        env:
          # Build-only placeholders. NEXT_PUBLIC_* vars are inlined at build time
          # and lib/env.ts validates required vars at module load, so the build
          # needs them present. CI only verifies the build compiles (no deploy),
          # so non-secret placeholders are sufficient here.
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ci-build-placeholder.apps.googleusercontent.com
          NEXTAUTH_SECRET: ci-build-placeholder-secret
          GOOGLE_CLIENT_SECRET: ci-build-placeholder-secret

      - name: Build web-admin
        run: pnpm --filter web-admin build

      - name: Lint service-api
        run: pnpm --filter service-api lint

      - name: Lint web-admin
        run: pnpm --filter web-admin lint

      - name: Typecheck all
        run: pnpm -r typecheck

      - name: Unit tests (service-api) with coverage
        run: pnpm --filter service-api test:cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/service-api/coverage/lcov.info
          flags: service-api
          fail_ci_if_error: false

      - name: Audit dependencies (high+)
        run: pnpm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan diff for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          # Scan only the PR/push diff for speed (not full history).
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified